      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.service: https-0-asc44o0ss8kgoo44gso04ggo-authentik-server
      traefik.http.routers.http-0-asc44o0ss8kgoo44gso04ggo-authentik-server.service: https-0-asc44o0ss8kgoo44gso04ggo-authentik-server
      coolify.managed: 'true'
      coolify.version: 4.0.0-beta.444
      coolify.serviceId: '18'
      coolify.type: service
      coolify.name: authentik-server-asc44o0ss8kgoo44gso04ggo
      coolify.resourceName: authentik-asc44o0ss8kgoo44gso04ggo
      coolify.projectName: test
      coolify.serviceName: authentik-server
      coolify.environmentName: production
      coolify.pullRequestId: '0'
      coolify.service.subId: '45'
      coolify.service.subType: application
      coolify.service.subName: authentik-server
      traefik.enable: 'true'
      traefik.http.middlewares.gzip.compress: 'true'
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
