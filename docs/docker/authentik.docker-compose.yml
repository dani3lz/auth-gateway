    - coolify.version=4.0.0-beta.444
    - coolify.serviceId=18
    - coolify.type=service
    - coolify.name=authentik-worker-asc44o0ss8kgoo44gso04ggo
    - coolify.resourceName=authentik-asc44o0ss8kgoo44gso04ggo
    - coolify.projectName=test
    - coolify.serviceName=authentik-worker
    - coolify.environmentName=production
    - coolify.pullRequestId=0
    - coolify.service.subId=46
    - coolify.service.subType=application
    - coolify.service.subName=authentik-worker
    networks:
