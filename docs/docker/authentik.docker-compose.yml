      traefik.http.routers.http-0-asc44o0ss8kgoo44gso04ggo-authentik-server.middlewares: redirect-to-https
      traefik.http.routers.http-0-asc44o0ss8kgoo44gso04ggo-authentik-server.rule: Host(`auth.sb.soltrix.dev`) && PathPrefix(`/`)
      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.entryPoints: https
      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.middlewares: gzip,login-root-redirect
      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.rule: Host(`auth.sb.soltrix.dev`) && PathPrefix(`/`)
      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.tls.certresolver: letsencrypt
      traefik.http.routers.https-0-asc44o0ss8kgoo44gso04ggo-authentik-server.tls: 'true'
      caddy_0.encode: zstd gzip
      caddy_0.handle_path.0_reverse_proxy: '{{upstreams}}'
      caddy_0.handle_path: /*
      caddy_0.header: -Server
      caddy_0.try_files: '{path} /index.html /index.php'
      caddy_0: https://auth.sb.soltrix.dev
      caddy_ingress_network: asc44o0ss8kgoo44gso04ggo
      traefik.http.routers.outpost-studio.rule: Host(`sb.soltrix.dev`) && PathPrefix(`/outpost.goauthentik.io/`)
