services:
  login:
    image: 'auth-gateway-login:local'
    environment:
      - COOKIE_DOMAIN=.${PARENT_DOMAIN}
      - 'LOGOUT_REDIRECT=https://${SB_HOST}/'
    expose:
      - '80'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1/auth/ >/dev/null || exit 1'
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      traefik.enable: 'true'
      traefik.http.routers.auth-login-https.rule: 'Host(`${SB_HOST}`) && PathPrefix(`/auth`)'
      traefik.http.routers.auth-login-https.entrypoints: https
      traefik.http.routers.auth-login-https.tls: 'true'
      traefik.http.routers.auth-login-https.tls.certresolver: letsencrypt
      traefik.http.routers.auth-login-https.priority: '200'
      traefik.http.routers.auth-login-https.service: auth-login-svc
      traefik.http.routers.auth-login-http.rule: 'Host(`${SB_HOST}`) && PathPrefix(`/auth`)'
      traefik.http.routers.auth-login-http.entrypoints: http
      traefik.http.routers.auth-login-http.middlewares: redirect-to-https
      traefik.http.routers.auth-login-http.priority: '200'
      traefik.http.routers.auth-login-http.service: auth-login-svc
      traefik.http.routers.auth-logout-https.rule: 'Host(`${SB_HOST}`) && Path(`/logout`)'
      traefik.http.routers.auth-logout-https.entrypoints: https
      traefik.http.routers.auth-logout-https.tls: 'true'
      traefik.http.routers.auth-logout-https.tls.certresolver: letsencrypt
      traefik.http.routers.auth-logout-https.priority: '250'
      traefik.http.routers.auth-logout-https.service: auth-login-svc
      traefik.http.routers.auth-logout-http.rule: 'Host(`${SB_HOST}`) && Path(`/logout`)'
      traefik.http.routers.auth-logout-http.entrypoints: http
      traefik.http.routers.auth-logout-http.middlewares: redirect-to-https
      traefik.http.routers.auth-logout-http.priority: '250'
      traefik.http.routers.auth-logout-http.service: auth-login-svc
      traefik.http.services.auth-login-svc.loadbalancer.server.port: '80'
      traefik.http.routers.manifest-stub-https.rule: 'Host(`${SB_HOST}`) && Path(`/favicon/manifest.json`)'
      traefik.http.routers.manifest-stub-https.entrypoints: https
      traefik.http.routers.manifest-stub-https.tls: 'true'
      traefik.http.routers.manifest-stub-https.tls.certresolver: letsencrypt
      traefik.http.routers.manifest-stub-https.priority: '300'
      traefik.http.routers.manifest-stub-https.service: auth-login-svc
      traefik.http.routers.notif-stub-https.rule: 'Host(`${SB_HOST}`) && PathPrefix(`/api/platform/notifications`)'
      traefik.http.routers.notif-stub-https.entrypoints: https
      traefik.http.routers.notif-stub-https.tls: 'true'
      traefik.http.routers.notif-stub-https.tls.certresolver: letsencrypt
      traefik.http.routers.notif-stub-https.priority: '300'
      traefik.http.routers.notif-stub-https.service: auth-login-svc

